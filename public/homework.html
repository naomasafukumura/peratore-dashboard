<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>宿題 | Pattern Practice</title>
<style>
  :root{
    --bg:#f4f6f5;--surface:#fff;--surface-alt:#f0f4f3;--border:#e0e8e5;--border-lt:#edf2f0;
    --accent:#2f5d62;--accent-soft:rgba(47,93,98,.08);--text:#1a2e2b;--text-sub:#4a6b66;
    --text-muted:#7a9b96;--text-faint:#aac4be;--green:#2a9d6a;--green-bg:rgba(42,157,106,.08);
    --green-bd:rgba(42,157,106,.3);--cta:#E9852D;--cta-hover:#D4751F;--cta-glow:rgba(233,133,45,.25);
    --sh-m:0 2px 12px rgba(0,0,0,.08);--r:16px;--ease:cubic-bezier(.4,0,.2,1);
    --fja:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    --fen:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--fja);background:var(--bg);color:var(--text);min-height:100vh}

  /* Header */
  .hw-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  .hw-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;color:var(--text);text-decoration:none;flex-shrink:0}
  .hw-back svg{width:18px;height:18px}
  .hw-brand{display:flex;align-items:center;gap:8px}
  .hw-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;font-family:var(--fen);letter-spacing:-.5px}
  .hw-title{font-size:14px;font-weight:700;color:var(--text)}
  .hw-student{font-size:13px;color:var(--text-sub);margin-left:auto}

  /* Content */
  .hw-body{padding:20px 16px;max-width:520px;margin:0 auto}
  .hw-sec-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
  .hw-empty{text-align:center;padding:60px 0;color:var(--text-muted);font-size:14px;line-height:1.8}

  /* Card list */
  .hw-list{display:flex;flex-direction:column;gap:6px;margin-bottom:24px}
  .hw-item{background:var(--surface);border:1px solid var(--border-lt);border-radius:12px;overflow:hidden}
  .hw-item-main{padding:12px 16px;display:flex;align-items:flex-start;gap:8px}
  .hw-item-body-wrap{flex:1;min-width:0}
  .hw-item-category{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:4px;letter-spacing:.02em}
  .hw-item-trigger{font-family:var(--fja);font-size:15px;font-weight:600;color:var(--text)}
  .hw-item-fpp{font-family:var(--fen);font-size:13px;color:var(--text-sub);margin-top:3px}
  .hw-item-spp{font-family:var(--fen);font-size:13px;color:var(--accent);font-weight:500;margin-top:2px}

  /* Expand button */
  .hw-expand-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-size:16px;font-weight:400;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;line-height:1;transition:all .15s;margin-top:2px}
  .hw-expand-btn.open{background:var(--accent);color:#fff}

  /* Detail panel */
  .hw-item-detail{display:none;padding:10px 16px 14px;border-top:1px solid var(--border-lt);background:var(--surface-alt)}
  .hw-item-detail.show{display:block}
  .hw-detail-pair{margin-bottom:10px}
  .hw-detail-pair:last-child{margin-bottom:0}
  .hw-detail-row{display:flex;gap:8px;margin-top:4px;line-height:1.5;font-size:13px}
  .hw-detail-lbl{font-size:10px;font-weight:700;color:var(--text-faint);width:26px;flex-shrink:0;padding-top:2px}
  .hw-detail-spp{color:var(--accent);font-weight:500;font-family:var(--fen)}
  .hw-detail-ja{font-size:11px;color:var(--text-muted);font-style:italic;margin-bottom:2px}

  /* Start button */
  .hw-start{width:100%;padding:16px;background:var(--cta);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;font-family:var(--fja);cursor:pointer;box-shadow:0 4px 20px var(--cta-glow);transition:all .2s var(--ease)}
  .hw-start:active{transform:scale(.98)}
  .hw-start:disabled{opacity:.5;cursor:default}

  /* Badge */
  .hw-badge{display:inline-block;background:var(--cta);color:#fff;font-size:11px;font-weight:700;font-family:var(--fen);padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle}
</style>
</head>
<body>

<div class="hw-header">
  <a id="backBtn" href="practice-v2.html" class="hw-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </a>
  <div class="hw-brand">
    <div class="hw-mark">PP</div>
    <div class="hw-title">宿題</div>
  </div>
  <div class="hw-student" id="studentLabel"></div>
</div>

<div class="hw-body">
  <div id="hwContent">
    <div class="hw-empty">読み込み中...</div>
  </div>
</div>

<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const student = params.get('student');

  // Back link
  const backBtn = document.getElementById('backBtn');
  if (student) backBtn.href = 'practice-v2.html?student=' + encodeURIComponent(student);

  // Student label (will update with display_name from API)
  if (student) document.getElementById('studentLabel').textContent = student + ' さん';

  // Fetch homework
  const url = student ? '/api/homework?student=' + encodeURIComponent(student) : '/api/homework';
  let cards = [];
  let displayName = null;
  try {
    const res = await fetch(url, { credentials: 'include' });
    if (res.ok) {
      const data = await res.json();
      cards = data.cards || [];
      displayName = data.displayName || null;
    }
  } catch (e) { console.error(e); }

  // Update student label with display_name if available
  if (displayName) {
    document.getElementById('studentLabel').textContent = displayName + ' さん';
  }

  const content = document.getElementById('hwContent');

  if (!cards.length) {
    content.innerHTML = '<div class="hw-empty">宿題はまだ設定されていません。<br>先生がレッスン後に設定します。</div>';
    return;
  }

  // セクションごとにカードをグループ化（cards_jsonの順序＝先生の選択順を保持）
  const secMap = new Map(); // secKey -> { firstCard, allCards, count }
  cards.forEach(c => {
    const sec = c._hwSection || c.chunkId || c.section || (c.states && c.states[0] && c.states[0].label) || c.trigger || '';
    if (!secMap.has(sec)) { secMap.set(sec, { firstCard: c, allCards: [], count: 0 }); }
    const entry = secMap.get(sec);
    entry.allCards.push(c);
    entry.count++;
  });
  // チャンク内のパターンをid ASCで並べる（チャンク間の順序はcards_json順を維持）
  secMap.forEach(entry => {
    entry.allCards.sort((a, b) => {
      const aId = parseInt(String(a.id).replace('db-', '')) || 0;
      const bId = parseInt(String(b.id).replace('db-', '')) || 0;
      return aId - bId;
    });
    entry.firstCard = entry.allCards[0];
  });
  const displayItems = Array.from(secMap.values());

  // Render list
  let html = '<div class="hw-sec-title">宿題の例文 <span class="hw-badge">' + displayItems.length + '件</span></div>';
  html += '<div class="hw-list">';
  displayItems.forEach(({ firstCard: c, allCards, count }) => {
    const st = c.states && c.states[0];
    // 展開パネルのHTML（全ペアを表示）
    let detailHtml = '';
    allCards.forEach((card, idx) => {
      const s = card.states && card.states[0];
      if (!s) return;
      detailHtml += '<div class="hw-detail-pair">';
      if (allCards.length > 1) detailHtml += '<div class="hw-detail-lbl" style="font-size:9px;color:var(--text-faint);margin-bottom:2px">Pair ' + (idx + 1) + '</div>';
      if (card.triggerJa) detailHtml += '<div class="hw-detail-ja">' + escHtml(card.triggerJa) + '</div>';
      detailHtml += '<div class="hw-detail-row"><span class="hw-detail-lbl">FPP</span><span>' + escHtml(card.trigger || '') + '</span></div>';
      if (s.conclusion) detailHtml += '<div class="hw-detail-row"><span class="hw-detail-lbl">SPP</span><span class="hw-detail-spp">' + escHtml(s.conclusion) + '</span></div>';
      if (s.followup) detailHtml += '<div class="hw-detail-row"><span class="hw-detail-lbl">FQ</span><span>' + escHtml(s.followup) + '</span></div>';
      if (s.conclusion2Examples && s.conclusion2Examples[0]) detailHtml += '<div class="hw-detail-row"><span class="hw-detail-lbl">FA</span><span>' + escHtml(s.conclusion2Examples[0]) + '</span></div>';
      detailHtml += '</div>';
    });

    html += '<div class="hw-item">';
    html += '<div class="hw-item-main">';
    html += '<div class="hw-item-body-wrap">';
    if (c._hwCategory) html += '<div class="hw-item-category">' + escHtml(c._hwCategory) + ' <span class="hw-badge">' + count + '</span></div>';
    html += '<div class="hw-item-trigger">' + escHtml(c.triggerJa || c.trigger || '') + '</div>';
    html += '<div class="hw-item-fpp">' + escHtml(c.trigger || '') + '</div>';
    if (st && st.conclusion) html += '<div class="hw-item-spp">' + escHtml(st.conclusion) + '</div>';
    html += '</div>';
    html += '<button class="hw-expand-btn" aria-label="詳細を見る">+</button>';
    html += '</div>';
    html += '<div class="hw-item-detail">' + detailHtml + '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Start button
  const practiceUrl = 'practice-v2.html?homework=1' + (student ? '&student=' + encodeURIComponent(student) : '');
  html += '<button class="hw-start" id="startBtn">練習を始める →</button>';

  content.innerHTML = html;

  // Expand button toggle
  content.querySelectorAll('.hw-expand-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const item = btn.closest('.hw-item');
      const detail = item.querySelector('.hw-item-detail');
      const isOpen = detail.classList.toggle('show');
      btn.textContent = isOpen ? '−' : '+';
      btn.classList.toggle('open', isOpen);
    });
  });

  document.getElementById('startBtn').addEventListener('click', () => {
    sessionStorage.setItem('hwCards', JSON.stringify(cards));
    window.location.href = practiceUrl;
  });

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
})();
</script>
</body>
</html>
